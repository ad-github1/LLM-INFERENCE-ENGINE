syntax = "proto3";

package llmengine;

service InferenceBackend {
  rpc Prefill(PrefillRequest) returns (ModelOutputBatch);
  rpc Decode(DecodeRequest) returns (ModelOutputBatch);
}

message PrefillItem {
  string request_id = 1;
  int32 token_start = 2;
  repeated int32 token_ids = 3;
  bool is_final_chunk = 4;
}

message PrefillRequest {
  repeated PrefillItem items = 1;
}

message DecodeItem {
  string request_id = 1;
  int32 token_id = 2;
  int32 position = 3;
}

message DecodeRequest {
  repeated DecodeItem items = 1;
}

message ModelOutput {
  string request_id = 1;
  int32 next_token = 2;
}

message ModelOutputBatch {
  repeated ModelOutput items = 1;
}
